<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="./css/horarios.css">
    <link rel="shortcut icon" href="img/logo.png" type="image/x-icon">
    <link rel="icon" href="img/logo.png" sizes="16x16">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <link href='https://cdn.jsdelivr.net/npm/boxicons@2.0.5/css/boxicons.min.css' rel='stylesheet'>
    <title>Casa Camarim - horários</title>
</head>

<body>
    <style>
        @font-face {
            font-family: Cormorant;
            src: url('font/Cormorant-Medium.ttf') format('truetype');
        }

        @font-face {
            font-family: Avenir;
            src: url('font/AvenirLTProBook.otf');
        }

        @font-face {
            font-family: Misswansa;
            src: url('font/Misswansa.ttf');
        }
    </style>

    <div id="loading">
        <div class="spinner"></div>
    </div>
    <button id="btnTopo"><i class="fa-solid fa-arrow-up"></i></button>

    <header>
        <nav>
            <div class="navigation">
                <ul class="menu">
                    <i class="fa-solid fa-xmark close-btn"></i>

                    <li class="menu-item"><a href="index.html" class="item">Início</a></li>
                    <li class="menu-item"><a href="horarios.html" class="item">Horários</a></li>

                    <li class="logo-container">
                        <img class="logo" src="img/logo.png" alt="Logo">
                    </li>

                    <li class="menu-item"><a href="" class="item">Contatos</a></li>
                    <li class="menu-item"><a href="agenda.html" class="item">Agenda</a></li>
                </ul>
            </div>

            <img class="logo-mobile" src="img/logo.png" alt="Logo">
            <i class="fa-solid fa-bars menu-btn"></i>
        </nav>
    </header>

    <!-- área dos serviços -->
    <main id="lista-servicos">
        <!-- Os serviços serão carregados aqui dinamicamente -->
    </main>

    <footer>
        <div class="creditos">
            <h1>&copy;2025 Inkey</h1>
        </div>
        <div class="midias">
            <!-- redes sociais -->
        </div>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const container = document.getElementById("lista-servicos");

            try {
                const response = await fetch("http://localhost:8080/api/servico");
                if (!response.ok) throw new Error("Erro ao buscar serviços");
                const servicos = await response.json();

                // Limpa o conteúdo
                container.innerHTML = "";

                // Caso não venha nada
                if (servicos.length === 0) {
                    container.innerHTML = "<p>Nenhum serviço cadastrado.</p>";
                    return;
                }

                // Gera os cards
                servicos.forEach(servico => {
                    const div = document.createElement("div");
                    div.classList.add("servico");

                    div.innerHTML = `
                        <div class="info">
                            <h2>${servico.nome}</h2>
                            <p><strong>Preço:</strong> R$ ${servico.preco}</p>
                            <p><strong>Duração:</strong> ${servico.tempoServico}</p>
                            <p><strong>Descrição:</strong> ${servico.descricaoServico || "Sem descrição."}</p>
                        </div>
                        <div class="agendar">
                            <a href="agendarUsuario.html?id=${servico.id_servico}">
                                <button>AGENDAR</button>
                            </a>
                        </div>
                    `;

                    container.appendChild(div);
                });

            } catch (error) {
                console.error("Erro ao carregar serviços:", error);
                container.innerHTML = "<p style='color:red;'>Erro ao carregar os serviços.</p>";
            }
        });
    </script>

    <!-- Scripts visuais -->
    <script src="js-decoracao/loadings.js"></script>
    <script src="js-decoracao/nav.js"></script>
</body>

</html>
