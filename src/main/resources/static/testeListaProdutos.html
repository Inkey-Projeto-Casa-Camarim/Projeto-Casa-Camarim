<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        #select-servico {
  padding: 0.5rem;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 1rem;
  margin-top: 0.5rem;
}
    </style>

    <script>
        // ======== POPULAR SELECT DE SERVIÇOS ========
async function carregarServicosSelect() {
  try {
    const response = await fetch("http://localhost:8080/api/servico");
    if (!response.ok) {
      throw new Error("Erro ao buscar serviços: " + response.status);
    }

    const servicos = await response.json();
    const select = document.getElementById("select-servico");

    // Limpa opções antigas
    select.innerHTML = '<option value="">Selecione um serviço</option>';

    // Cria opções dinamicamente
    servicos.forEach(servico => {
      const option = document.createElement("option");
      option.value = servico.id_servico; // valor do ID
      option.textContent = servico.nome; // nome visível
      select.appendChild(option);
    });

  } catch (error) {
    console.error("Erro:", error);
    const select = document.getElementById("select-servico");
    select.innerHTML = '<option value="">Erro ao carregar serviços</option>';
  }
}

// Chama a função ao carregar a página
carregarServicosSelect();

    </script>

<label for="select-servico">Selecione o serviço:</label>
<select id="select-servico">
  <option value="">Carregando serviços...</option>
</select>


</body>
</html>
